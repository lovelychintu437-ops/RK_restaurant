<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RK Restaurant Ultra</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;scroll-behavior:smooth;}
body{background:#000;color:#fff;}

.navbar{position:sticky;top:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(12px);padding:15px 40px;display:flex;justify-content:space-between;z-index:1000;}
.navbar h2{color:#facc15;}
.navbar a{color:#fff;margin-left:20px;text-decoration:none;}
.navbar a:hover{color:#facc15;}

.hero{text-align:center;padding:90px 20px;background:linear-gradient(to bottom,#000,#111);}
.hero h1{font-size:56px;color:#facc15;}
.hero p{color:#aaa;margin-top:10px;}
.hero small{color:#facc15;display:block;margin-top:10px;}

.search-box{text-align:center;margin:20px;}
.search-box input{padding:10px;width:260px;border-radius:8px;border:none;background:#222;color:#fff;}

.filter-bar{text-align:center;margin:20px;}
.filter-bar button{margin:5px;background:#222;}
.filter-bar button.active{background:#facc15;color:#000;}

.section{padding:40px;}
.section h2{margin-bottom:20px;border-left:4px solid #facc15;padding-left:10px;}

.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:20px;}

.card{background:rgba(255,255,255,0.05);border-radius:18px;overflow:hidden;transition:0.3s;border:1px solid rgba(255,255,255,0.1);}
.card:hover{transform:translateY(-8px) scale(1.05);}

.card-top{height:120px;display:flex;align-items:center;justify-content:center;font-size:42px;}
.card-body{padding:15px;}
.price{color:#facc15;margin:8px 0;font-weight:bold;}

button{background:#16a34a;border:none;padding:7px 14px;border-radius:8px;color:#fff;cursor:pointer;}
button:hover{background:#22c55e;}

.counter{display:flex;align-items:center;gap:8px;margin-top:5px;}
.counter button{padding:4px 10px;background:#222;}

.cart{position:fixed;top:80px;right:20px;background:rgba(0,0,0,0.8);padding:15px;border-radius:12px;width:270px;}
.cart h3{color:#facc15;}
.total{margin-top:10px;font-weight:bold;}

.whatsapp{position:fixed;bottom:20px;left:20px;background:#25D366;color:#000;padding:12px 16px;border-radius:50px;cursor:pointer;}

.form-section{text-align:center;padding:70px 20px;}
.form-box{background:rgba(255,255,255,0.05);padding:25px;border-radius:16px;width:320px;margin:auto;}
input,select{width:100%;margin:8px 0;padding:10px;border:none;border-radius:8px;background:#222;color:#fff;}
.confirm{background:#facc15;color:#000;width:100%;}

#paymentBox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;}

@media(max-width:1200px){.grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:700px){.grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>

<body>

<div class="navbar">
<h2>RK Restaurant</h2>
<div>
<a href="#">Menu</a>
<a href="#">Order</a>
</div>
</div>

<div class="hero">
<h1>🍽️ RK Restaurant</h1>
<p>Luxury Dining • Premium Taste • NH65</p>
<small>Ultra Experience Menu</small>
</div>

<div class="search-box">
<input type="text" id="search" placeholder="🔍 Search food...">
</div>

<div class="filter-bar">
<button class="active">All</button>
<button>Veg</button>
<button>Non-Veg</button>
</div>

<div class="cart">
<h3>🛒 Cart</h3>
<div id="cartItems">No items yet</div>
<div class="total" id="total">₹0</div>
</div>

<!-- SAMPLE ITEM (apply same pattern to all items if needed) -->
<div class="section">
<h2>Biryani</h2>
<div class="grid">

<div class="card">
<div class="card-top">🍛</div>
<div class="card-body">
<h3>Chicken Biryani</h3>
<div class="price">₹160</div>
<button onclick="handleAdd(this,'Chicken Biryani',160)">Add</button>
<span onclick="toggleFav(this)" style="cursor:pointer;">🤍</span>
</div>
</div>

</div>
</div>

<div class="form-section">
<h2>🧾 Pre-Order & Table Reservation</h2>
<div class="form-box">
<input placeholder="Your Name">
<input placeholder="No. of People">
<input type="date">
<input type="time">
<select><option>Dine In</option></select>
<input id="selectedItems" placeholder="Selected Items" readonly>
<button class="confirm" onclick="placeOrder()">Proceed to Pay</button>
</div>
</div>

<div id="paymentBox">
<div style="background:#111;padding:25px;border-radius:12px;text-align:center;">
<h3 style="color:#facc15;">💳 Payment</h3>
<h2 id="payAmount">₹0</h2>
<input placeholder="UPI ID">
<button onclick="completePayment()">Pay Now</button>
</div>
</div>

<div class="whatsapp" onclick="sendWhatsApp()">Order</div>

<script>
let cart=[];
let totalAmount=0;

function handleAdd(btn,name,price){
cart.push({name,price,qty:1});
btn.style.display='none';
updateCart();
}

function updateCart(){
let cartItems=document.getElementById('cartItems');
let total=0;
cartItems.innerHTML='';
cart.forEach(i=>{
let d=document.createElement('div');
d.innerText=i.name+' x '+i.qty;
cartItems.appendChild(d);
total+=i.price*i.qty;
});
totalAmount=total;
document.getElementById('total').innerText='₹'+total;
document.getElementById('selectedItems').value=cart.map(i=>i.name).join(',');
}

document.getElementById('search').addEventListener('input',function(){
let v=this.value.toLowerCase();
document.querySelectorAll('.card').forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?'block':'none';
});
});

function toggleFav(el){
el.innerText = el.innerText==='🤍'?'❤️':'🤍';
}

function placeOrder(){
document.getElementById('paymentBox').style.display='flex';
document.getElementById('payAmount').innerText='₹'+totalAmount;
}

function completePayment(){
alert("Payment Successful!");
cart=[];
updateCart();
document.getElementById('paymentBox').style.display='none';
}

function sendWhatsApp(){
window.open('https://wa.me/?text=Order','_blank');
}
</script>

</body>
</html>
